# 注：日后 GoodGithub 拆为独立 GitHub 仓库时，本 workflow 生效。
#
# 用途：每天北京时间 08:30 自动抓取 GitHub Trending 并生成 LLM 摘要，
#       将数据 JSON commit 回 main 分支，触发 Cloudflare Pages 重新构建。
#
# 启用前置条件：
#   1. GoodGithub 已拆为独立 GitHub 仓库
#   2. 在仓库 Settings → Secrets and variables → Actions 中配置：
#      - GH_TOKEN   : 个人 PAT（classic），需 public_repo 权限
#                     （不能直接用 GITHUB_TOKEN，会与 Actions 内置变量冲突）
#      - DEEPSEEK_API_KEY : DeepSeek 平台 API Key
#   3. 本地跑一次 `pnpm install` 生成 pnpm-lock.yaml 并提交，
#      否则 `--frozen-lockfile` 步骤将报错

name: Collect GitHub Trending

on:
  schedule:
    - cron: '30 0 * * *'   # UTC 00:30 = 北京时间 08:30
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 强制重跑 LLM 摘要（忽略 readme_hash 缓存）
        type: boolean
        default: false

permissions:
  contents: write    # 允许 commit + push 数据 JSON

concurrency:
  group: collect
  cancel-in-progress: false   # 正在采集时不中断，排队等待

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: 抓取 Trending + 拉 repo 详情
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: pnpm collect

      - name: LLM 摘要
        env:
          LLM_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-chat
          FORCE_REGENERATE: ${{ inputs.force_regenerate }}
        run: pnpm summarize

      - name: 提交数据变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "无数据变更，跳过 commit"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore: 采集 ${DATE} daily 数据"
          git push
